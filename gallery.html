<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery</title>

  <style>
    body { font-family: Arial, sans-serif; margin:0; }

    header {
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:15px 30px;
      background:#0a625b;
      color:#fff;
    }

    header a {
      color:#fff;
      text-decoration:none;
      margin-left:15px;
    }

    h1 { text-align:center; margin:30px 0; }

    .gallery {
      display:grid;
      grid-template-columns:repeat(auto-fit, minmax(250px,1fr));
      gap:15px;
      padding:20px;
    }

    .gallery img {
      width:100%;
      height:250px;
      object-fit:cover;
      border-radius:10px;
      cursor:pointer;
      transition: transform 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    /* LIGHTBOX */
    .lightbox {
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      height:100%;
      background:rgba(0,0,0,0.8);
      justify-content:center;
      align-items:center;
      z-index:1000;
    }

    .lightbox img {
      max-width:90%;
      max-height:80%;
      border-radius:10px;
    }

    .lightbox.active {
      display:flex;
    }

  </style>
</head>
<body>

<header>
  <h2>My NGO</h2>
  <nav>
    <a href="index.html">Home</a>
  </nav>
</header>

<h1>Our Gallery</h1>

<div class="gallery">
  <img src="images/gallery1.png" loading="lazy" onclick="openLightbox(this)">
  <img src="images/gallery2.jpg" loading="lazy" onclick="openLightbox(this)">
  <img src="images/gallery3.png" loading="lazy" onclick="openLightbox(this)">
  <img src="images/gallery4.png" loading="lazy" onclick="openLightbox(this)">
  <img src="images/gallery5.jpg" loading="lazy" onclick="openLightbox(this)">
  <img src="images/gallery6.jpg" loading="lazy" onclick="openLightbox(this)">
</div>

<!-- Lightbox -->
<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img id="lightbox-img">
</div>

<script>
  function openLightbox(img) {
    const lightbox = document.getElementById('lightbox');
    const lightboxImg = document.getElementById('lightbox-img');

    lightboxImg.src = img.src;
    lightbox.classList.add('active');
  }

  function closeLightbox() {
    document.getElementById('lightbox').classList.remove('active');
  }
</script>

</body>
</html>
