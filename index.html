<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Website Under Construction</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background: linear-gradient(135deg, #145a32, #27ae60);
      color: #fff;
      text-align: center;
    }

    .container {
      max-width: 600px;
      padding: 20px;
    }

    h1 {
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {
      font-size: 18px;
      line-height: 1.6;
    }

    .loader {
      margin: 30px auto;
      width: 60px;
      height: 60px;
      border: 6px solid rgba(255,255,255,0.3);
      border-top: 6px solid #fff;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }

    .contact {
      margin-top: 20px;
      font-size: 16px;
      opacity: 0.9;
    }

  </style>
</head>
<body>

  <div class="container">
    <h1>🚧 Under Construction</h1>
    <p>
      Our website is currently being built to serve you better. 
      We are working hard to bring you an improved experience.
    </p>

    <div class="loader"></div>

    <p class="contact">
      For inquiries, contact us at:<br>
      <strong>info@greenishfoundation.org</strong>
    </p>
  </div>

</body>
</html>
